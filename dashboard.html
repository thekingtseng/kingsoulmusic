<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員後台 · KingSoulMusic</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --ink:#0B0B0F;
    --gold:#D4A857;
    --gold-bright:#E9C77B;
    --paper:#F2EFE9;
    --muted:#8A8786;
    --ember:#3A2A12;
    --line: rgba(212,168,87,0.18);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background: var(--ink);
    color: var(--paper);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Cinzel', serif;
    font-size: 15px;
    letter-spacing:1.5px;
  }
  .brand .seal{
    width:28px; height:28px;
    border-radius:50%;
    border: 1px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 50% 40%, var(--ember), var(--ink) 75%);
    font-size:12px;
    color: var(--gold-bright);
  }

  .signout{
    font-size: 12.5px;
    color: var(--muted);
    background:none;
    border: 1px solid var(--line);
    padding: 7px 14px;
    border-radius: 4px;
    cursor:pointer;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .signout:hover{ border-color: var(--gold); color: var(--paper); }

  main{
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .loading{
    text-align:center;
    color: var(--muted);
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    padding: 60px 0;
  }

  section{ display:none; }
  section.ready{ display:block; }

  .section-title{
    font-family:'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--gold-bright);
    margin: 32px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .section-title:first-of-type{ margin-top:0; }

  label{
    display:block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input{
    width:100%;
    padding: 11px 13px;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--paper);
    font-size: 14px;
    font-family:'Inter', sans-serif;
    transition: border-color 0.2s ease;
  }
  input:focus{ outline:none; border-color: var(--gold); }
  input::placeholder{ color: rgba(138,135,134,0.45); }

  .platform-row{
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .platform-row .ico{
    width: 18px;
    flex-shrink:0;
    color: var(--gold-bright);
    margin-bottom:16px;
  }
  .platform-row input{ flex:1; }

  button.save{
    width:100%;
    padding: 13px;
    background: var(--gold-bright);
    color: var(--ink);
    border:none;
    border-radius:4px;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.3px;
    cursor:pointer;
    margin-top: 12px;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  button.save:hover{ background: var(--gold); }
  button.save:active{ transform: scale(0.98); }
  button.save:disabled{ opacity:0.5; cursor:not-allowed; }

  .msg{
    margin-top: 14px;
    padding: 10px 12px;
    border-radius:4px;
    font-size: 13px;
    text-align:center;
    display:none;
  }
  .msg.success{
    display:block;
    background: rgba(212,168,87,0.10);
    border: 1px solid rgba(212,168,87,0.3);
    color: var(--gold-bright);
  }
  .msg.error{
    display:block;
    background: rgba(199,92,74,0.12);
    border: 1px solid rgba(199,92,74,0.3);
    color: #E0A89C;
  }

  .preview-box{
    margin-top: 32px;
    padding: 16px;
    border: 1px dashed var(--line);
    border-radius: 6px;
    text-align:center;
  }
  .preview-box p{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 10px;
  }
  .preview-link{
    color: var(--gold-bright);
    font-size: 13px;
    text-decoration:none;
    word-break: break-all;
  }
  .preview-link:hover{ text-decoration:underline; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="seal">朕</div>
    KINGSOULMUSIC
  </div>
  <button class="signout" onclick="signOut()">登出</button>
</header>

<main>
  <div class="loading" id="loadingMsg">讀取資料中…</div>

  <section id="editor">
    <div class="section-title">個人資訊</div>

    <label for="displayName">顯示名稱</label>
    <input type="text" id="displayName" placeholder="King Tseng">

    <label for="username">主頁網址代稱（英文/數字，例如 kingsoul → 之後主頁網址為 /u/kingsoul）</label>
    <input type="text" id="username" placeholder="kingsoul">

    <label for="tagline">一句話介紹</label>
    <input type="text" id="tagline" placeholder="音樂為令，世界為疆">

    <div class="section-title">平台連結</div>

    <label for="spotify">Spotify</label>
    <input type="url" id="spotify" placeholder="https://open.spotify.com/artist/...">

    <label for="youtube">YouTube</label>
    <input type="url" id="youtube" placeholder="https://youtube.com/@...">

    <label for="instagram">Instagram</label>
    <input type="url" id="instagram" placeholder="https://instagram.com/...">

    <label for="appleMusic">Apple Music</label>
    <input type="url" id="appleMusic" placeholder="https://music.apple.com/...">

    <label for="tiktok">TikTok</label>
    <input type="url" id="tiktok" placeholder="https://tiktok.com/@...">

    <label for="kkbox">KKBOX</label>
    <input type="url" id="kkbox" placeholder="https://kkbox.fm/...">

    <button class="save" id="saveBtn" onclick="saveProfile()">儲存變更</button>

    <div class="msg" id="msgBox"></div>

    <div class="preview-box">
      <p>你的公開主頁網址（儲存後即可分享）</p>
      <a class="preview-link" id="previewLink" href="#" target="_blank">尚未設定 username</a>
    </div>
  </section>
</main>

<script>
  const SUPABASE_URL = "https://gmxlddmudiuvukyudmeo.supabase.co";
  const SUPABASE_KEY = "sb_publishable_DUakPRAVbniIRv0xdYkMuA_uzsfQHTL";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;

  async function init(){
    const { data } = await supabase.auth.getSession();
    if (!data.session) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = data.session.user;

    const { data: profile, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .single();

    if (error) {
      console.error(error);
    } else if (profile) {
      document.getElementById('displayName').value = profile.display_name || '';
      document.getElementById('username').value = profile.username || '';
      document.getElementById('tagline').value = profile.tagline || '';
      document.getElementById('spotify').value = profile.spotify_url || '';
      document.getElementById('youtube').value = profile.youtube_url || '';
      document.getElementById('instagram').value = profile.instagram_url || '';
      document.getElementById('appleMusic').value = profile.apple_music_url || '';
      document.getElementById('tiktok').value = profile.tiktok_url || '';
      document.getElementById('kkbox').value = profile.kkbox_url || '';
      updatePreviewLink(profile.username);
    }

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('editor').classList.add('ready');
  }

  function updatePreviewLink(username){
    const link = document.getElementById('previewLink');
    if (username) {
      const folder = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
      const url = `${window.location.origin}${folder}u.html?u=${username}`;
      link.href = url;
      link.textContent = url;
    } else {
      link.href = '#';
      link.textContent = '尚未設定 username';
    }
  }

  async function saveProfile(){
    const btn = document.getElementById('saveBtn');
    const msgBox = document.getElementById('msgBox');
    btn.disabled = true; btn.textContent = '儲存中…';
    msgBox.className = 'msg';

    const username = document.getElementById('username').value.trim().toLowerCase().replace(/[^a-z0-9_-]/g, '');

    const updates = {
      display_name: document.getElementById('displayName').value.trim(),
      username: username || null,
      tagline: document.getElementById('tagline').value.trim(),
      spotify_url: document.getElementById('spotify').value.trim(),
      youtube_url: document.getElementById('youtube').value.trim(),
      instagram_url: document.getElementById('instagram').value.trim(),
      apple_music_url: document.getElementById('appleMusic').value.trim(),
      tiktok_url: document.getElementById('tiktok').value.trim(),
      kkbox_url: document.getElementById('kkbox').value.trim(),
      updated_at: new Date().toISOString()
    };

    const { error } = await supabase
      .from('profiles')
      .update(updates)
      .eq('id', currentUser.id);

    btn.disabled = false; btn.textContent = '儲存變更';

    if (error) {
      msgBox.textContent = error.message.includes('duplicate') ? '這個網址代稱已經被使用了，請換一個' : '儲存失敗：' + error.message;
      msgBox.className = 'msg error';
    } else {
      msgBox.textContent = '已儲存！';
      msgBox.className = 'msg success';
      updatePreviewLink(username);
    }
  }

  async function signOut(){
    await supabase.auth.signOut();
    window.location.href = 'login.html';
  }

  init();
</script>

</body>
</html>
