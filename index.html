<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KingSoulMusic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --ink:#0B0B0F;
    --ink-2:#15141B;
    --gold:#D4A857;
    --gold-bright:#E9C77B;
    --paper:#F2EFE9;
    --muted:#8A8786;
    --ember:#3A2A12;
    --line: rgba(212,168,87,0.18);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ambient texture */
  body::before{
    content:"";
    position: fixed;
    inset:0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(212,168,87,0.10), transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(212,168,87,0.05), transparent 60%);
    pointer-events:none;
    z-index:0;
  }

  body::after{
    content:"";
    position: fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(212,168,87,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,168,87,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none;
    z-index:0;
  }

  .wrap{
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 64px 28px 56px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---- Seal ---- */
  .seal-stage{
    width: 108px;
    height: 108px;
    margin-bottom: 28px;
    perspective: 600px;
  }

  .seal{
    width:100%;
    height:100%;
    border-radius:50%;
    border: 1.5px solid var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at 50% 40%, var(--ember), var(--ink) 75%);
    box-shadow:
      0 0 0 1px rgba(212,168,87,0.15),
      0 0 24px rgba(212,168,87,0.18),
      inset 0 0 18px rgba(212,168,87,0.12);
    transform: scale(2.6) rotate(-8deg);
    opacity:0;
    animation: stamp 0.9s cubic-bezier(.2,.9,.25,1) 0.15s forwards;
  }

  .seal::before{
    content:"";
    position:absolute;
    width: 86%;
    height: 86%;
    border-radius:50%;
    border: 1px dashed var(--line);
  }

  .seal-glyph{
    font-family: 'Cinzel', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--gold-bright);
    letter-spacing: 1px;
    text-shadow: 0 0 14px rgba(212,168,87,0.5);
    transform: translateY(1px);
  }

  @keyframes stamp{
    0%   { transform: scale(2.6) rotate(-8deg); opacity:0; }
    55%  { transform: scale(0.94) rotate(1deg); opacity:1; }
    75%  { transform: scale(1.05) rotate(-0.5deg); }
    100% { transform: scale(1) rotate(0deg); opacity:1; }
  }

  .seal-ring{
    position:absolute;
    inset:-14px;
    border-radius:50%;
    border: 1px solid rgba(212,168,87,0.35);
    opacity:0;
    animation: ringpop 1s ease-out 0.5s forwards;
  }
  @keyframes ringpop{
    0%{ transform:scale(0.6); opacity:0.8;}
    100%{ transform:scale(1.35); opacity:0;}
  }

  .seal-stage{ position:relative; }

  /* ---- Identity ---- */
  h1{
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 7vw, 36px);
    font-weight: 700;
    letter-spacing: 2.5px;
    text-align:center;
    color: var(--paper);
    opacity:0;
    animation: rise 0.7s ease-out 0.7s forwards;
  }

  h1 span{ color: var(--gold-bright); }

  .tagline{
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    font-weight: 500;
    color: var(--muted);
    margin-top: 10px;
    text-align:center;
    letter-spacing: 0.3px;
    opacity:0;
    animation: rise 0.7s ease-out 0.85s forwards;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .divider{
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 32px 0;
    opacity:0;
    animation: rise 0.6s ease-out 1s forwards;
  }

  /* ---- Links: insignia row ---- */
  .insignia-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width:100%;
    opacity:0;
    animation: rise 0.7s ease-out 1.1s forwards;
  }

  .insignia{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    text-decoration:none;
    color: var(--paper);
    padding: 20px 8px 16px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: linear-gradient(180deg, rgba(212,168,87,0.03), transparent);
    transition: border-color 0.25s ease, transform 0.25s ease, background 0.25s ease;
    position: relative;
  }

  .insignia::before{
    content:"";
    position:absolute;
    top:6px; left:6px; right:6px; bottom:6px;
    border: 1px solid transparent;
    border-radius: 2px;
    transition: border-color 0.25s ease;
  }

  .insignia:hover, .insignia:focus-visible{
    border-color: var(--gold);
    transform: translateY(-3px);
    background: linear-gradient(180deg, rgba(212,168,87,0.10), rgba(212,168,87,0.02));
  }
  .insignia:hover::before, .insignia:focus-visible::before{
    border-color: rgba(212,168,87,0.25);
  }

  .insignia:focus-visible{
    outline: 2px solid var(--gold-bright);
    outline-offset: 2px;
  }

  .insignia svg{
    width: 26px;
    height: 26px;
    stroke: var(--gold-bright);
    fill: none;
    stroke-width: 1.5;
  }

  .insignia .ico-fill{ fill: var(--gold-bright); stroke:none; }

  .insignia .label{
    font-family:'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.4px;
    color: var(--muted);
  }

  .insignia:hover .label, .insignia:focus-visible .label{
    color: var(--paper);
  }

  /* ---- Secondary links (full width rows) ---- */
  .scroll-list{
    width:100%;
    margin-top: 14px;
    display:flex;
    flex-direction:column;
    gap: 10px;
    opacity:0;
    animation: rise 0.7s ease-out 1.25s forwards;
  }

  .row-link{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding: 15px 18px;
    border: 1px solid var(--line);
    border-radius: 4px;
    text-decoration:none;
    color: var(--paper);
    font-size: 14.5px;
    font-weight:500;
    background: rgba(255,255,255,0.01);
    transition: border-color 0.25s ease, background 0.25s ease, padding-left 0.25s ease;
  }

  .row-link:hover, .row-link:focus-visible{
    border-color: var(--gold);
    background: rgba(212,168,87,0.06);
    padding-left: 22px;
  }
  .row-link:focus-visible{
    outline: 2px solid var(--gold-bright);
    outline-offset: 2px;
  }

  .row-link .arrow{
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    transition: transform 0.25s ease;
  }
  .row-link:hover .arrow{ transform: translateX(4px); }

  /* ---- Footer ---- */
  footer{
    margin-top: 48px;
    text-align:center;
    opacity:0;
    animation: rise 0.7s ease-out 1.4s forwards;
  }

  footer .crest-line{
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 14px;
  }

  footer p{
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  footer .ig-handle{
    color: var(--gold-bright);
    text-decoration: none;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
  }

  @media (max-width: 360px){
    .insignia .label{ font-size: 11px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="seal-stage">
    <div class="seal-ring"></div>
    <div class="seal">
      <span class="seal-glyph">朕</span>
    </div>
  </div>

  <h1>KING<span>SOUL</span>MUSIC</h1>
  <p class="tagline">音樂為令，世界為疆</p>

  <div class="divider"></div>

  <!-- Primary platforms as insignia -->
  <div class="insignia-grid">

    <a class="insignia" href="#" target="_blank" rel="noopener" aria-label="Spotify">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9.5"/><path class="ico-fill" d="M7.5 9.8c2.7-.8 6-.6 8.3.7.3.2.3.6.1.9-.2.3-.6.3-.9.1-2-1.1-4.9-1.3-7.2-.6-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7zm.2 2.7c2.3-.7 5.1-.5 7 .6.3.2.4.5.2.8-.2.3-.5.4-.8.2-1.7-1-4.2-1.2-6.1-.6-.3.1-.6-.1-.7-.4 0-.3.1-.5.4-.6zm-.3 2.6c2-.6 4.4-.4 6 .6.2.2.3.4.1.7-.1.2-.4.3-.6.1-1.4-.8-3.5-1-5.3-.5-.3.1-.5-.1-.6-.3-.1-.2.1-.5.4-.6z" stroke="none"/></svg>
      <span class="label">Spotify</span>
    </a>

    <a class="insignia" href="#" target="_blank" rel="noopener" aria-label="YouTube">
      <svg viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="3"/><path class="ico-fill" d="M10.5 9.3v5.4l4.6-2.7z" stroke="none"/></svg>
      <span class="label">YouTube</span>
    </a>

    <a class="insignia" href="#" target="_blank" rel="noopener" aria-label="Instagram">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle class="ico-fill" cx="17.2" cy="6.8" r="1.1" stroke="none"/></svg>
      <span class="label">Instagram</span>
    </a>

  </div>

  <!-- Secondary links -->
  <div class="scroll-list">
    <a class="row-link" href="#" target="_blank" rel="noopener">
      <span>Apple Music</span>
      <span class="arrow">→</span>
    </a>
    <a class="row-link" href="#" target="_blank" rel="noopener">
      <span>TikTok</span>
      <span class="arrow">→</span>
    </a>
    <a class="row-link" href="#" target="_blank" rel="noopener">
      <span>KKBOX</span>
      <span class="arrow">→</span>
    </a>
    <a class="row-link" href="#" target="_blank" rel="noopener">
      <span>最新單曲《朕在崩潰》</span>
      <span class="arrow">→</span>
    </a>
  </div>

  <footer>
    <div class="crest-line"></div>
    <p>KingSoulMusic · <a class="ig-handle" href="https://instagram.com/thekingtseng" target="_blank" rel="noopener">@thekingtseng</a></p>
  </footer>

</div>

</body>
</html>
